spring.application.name=gridflex-backend-service

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?ApplicationName=gridflex-backend-service
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
logging.level.org.postgresql=DEBUG

spring.data.mongodb.uri=mongodb://${MONGO_HOST}:${MONGO_PORT}/${MONGO_DB}

#springdoc.api-docs.enabled=true
#springdoc.swagger-ui.enabled=true

# Flyway settings
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.table=flyway_schema_history_gridflex_service

file.upload-dir=${UPLOAD}/uploads
file.base-address = https://sbctest.memmserve.com

external.token-gen.base-url=http://${T_ADDRESS}:${T_PORT}

external.hes-endpoint.base-url=http://${HES_ADDRESS}:${HES_PORT}/api
external.hes-realtime.base-url=http://${HES_ADDRESS}:${HES_PORT}/api/realtime
external.dlms-write-ops.base-url=http://${HES_ADDRESS}:${HES_PORT}/api/dlms

