server:
  port: 9080

app:
  base-path: /grid-flex/v1/api
#  /api/v1
#  /grid-flex/v1/api

spring:
  jackson:
    default-property-inclusion: non_null

odyssey:
  jwt-secret: ${JWT_SECRET}

security:
  header:
    key: ${HEADER_KEY}
  admin:
    value: ${ADMIN_API_VALUE}
  user:
    value: ${USER_API_VALUE}
  setup:
    value: ${SETUP_API_VALUE}

external:
  token-gen:
    base-url: http://169.239.189.91:19071
  hes-endpoint:
    base-url: http://127.0.0.1:9061/api
  hes-realtime:
    base-url: http://127.0.0.1:9061/api/realtime
  dlms-write-ops:
    base-url: http://127.0.0.1:9061/api/dlms

