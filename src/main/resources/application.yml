springdoc:
  api-docs:
    path: /gridflex/api-docs

  swagger-ui:
    path: /swagger-ui.html
    config-url: /api/v1/gridflex/api-docs/swagger-config
    url: /api/v1/gridflex/api-docs

  packages-to-scan: org.memmcol.gridflexbackendservice.thirdPartyService
#    urls:
#      - name: Admin
#        url: /v3/api-docs/admin

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true                # Register using IP instead of hostname
    ip-address: ${spring.cloud.client.ip-address}  # Auto-detects service IP
    instance-id: ${spring.application.name}:${server.port}
    metadata-map:
      management.port: ${management.server.port:${server.port}}

management:
  server:
    port: ${server.port}  # Use same port for actuator unless you want a separate port
  endpoints:
    web:
      exposure:
        include: "*"
  metrics:
    tags:
      application: ${spring.application.name}

resilience4j:
  circuitbreaker:
    instances:
      productService:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s


