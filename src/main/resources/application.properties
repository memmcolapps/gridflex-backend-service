hazelcast.instance-name = auth-instance
hazelcast.cluster-name = auth-cluster
hazelcast.network.port = 5702
hazelcast.network.join.multicast.enabled = true
hazelcast.time-to-live-seconds = 86400
hazelcast.max-size = 1000
hazelcast-max-idle-seconds = 18000
hazelcast-in-memory-format = OBJECT
hazelcast-invalidate-on-change = true
hazelcast-max-size-policy = ENTRY_COUNT
hazelcast-eviction-policy = LFU
hazelcast-cache-local-entries = false
hazelcast-enabled = true
hazelcast-directory = nearcache-dev
hazelcast-store-initial-delay-seconds = 300
hazelcast-store-interval-seconds = 600
hazelcast-local-update-policy = INVALIDATE
hazelcast-local-entries = true
hazelcast-serialize-key = true


