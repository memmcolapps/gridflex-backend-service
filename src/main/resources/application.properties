spring.application.name=gridflex-backend-service

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?ApplicationName=gridflex-backend-service
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
logging.level.org.postgresql=DEBUG

spring.data.mongodb.uri=mongodb://${MONGO_HOST}:${MONGO_PORT}/${MONGO_DB}

#?connectTimeout=10&sslmode=prefer

#springdoc.api-docs.path=/api
#springdoc.api-docs.path=/v3/api-docs
#springdoc.swagger-ui.path=/swagger-ui.html
#springdoc.swagger-ui.config-url: /api/v1/v3/api-docs/swagger-config
#springdoc.swagger-ui.url: /api/v1/v3/api-docs

# Timezone setting
spring.jackson.time-zone=Africa/Lagos
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# HikariCP settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.leak-detection-threshold=20000

spring.datasource.hikari.data-source-properties.applicationName=gridflex-backend-service

## Flyway settings
#spring.flyway.enabled=true
#spring.flyway.locations=classpath:db/migration
#spring.flyway.baseline-on-migrate=true
#spring.flyway.baseline-version=0
#spring.flyway.table=flyway_schema_history_gridflex_service

# Show SQL statements
spring.jpa.show-sql=true

# Format SQL logs
spring.jpa.properties.hibernate.format_sql=true

# Log transaction boundaries (commit/rollback)
logging.level.org.springframework.transaction=DEBUG

# Log when connections are taken/released from the pool
logging.level.com.zaxxer.hikari=DEBUG

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


management.endpoints.web.exposure.include=*
management.prometheus.metrics.export.enabled=true
management.endpoints.web.base-path=/actuator
management.endpoint.prometheus.access=unrestricted

file.upload-dir=${UPLOAD}/uploads
#file.upload-dir = C:/Users/H.Soliu/Documents/Memmcol-project/uploads

spring.hazelcast.enabled=false

#base.url: /api

# Properties
success.code = 000
fail.code = 013
token.code = 001
reg.code = 010
payload.code = 011
block.code = 012
update.code = 020
del.code = 030
get.code = 040
exist.code = 050
notfound.code = 060
token.notfound.code = 061
role.code = 070
role.del.code = 080
role.update.code = 090

# Descriptions
payload.desc = Bad Request
success.desc = Successful
fail.desc = Unsuccessfully
token.desc = Authentication Successful
token.notfound.desc = Authorization Token Not Found
reg.desc = Registered Successfully
notfound.desc = Not Found
update.desc = Updated Successfully
del.desc = Deactivated Successfully
get.desc = Fetched Successfully
exist.desc = Already Exist

block.fail.desc = Blocked Unsuccessfully
reg.fail.desc = Registration Unsuccessfully
update.fail.desc = Update Unsuccessfully
del.fail.desc = Disabled Unsuccessfully
get.fail.desc = Fetching Unsuccessfully

hazelcast.instance-name = auth-instance
hazelcast.cluster-name = auth-cluster
hazelcast.network.port = 5702
hazelcast.network.join.multicast.enabled = false
hazelcast.time-to-live-seconds = 86400
hazelcast.max-size = 1000
hazelcast-max-idle-seconds = 18000
hazelcast-in-memory-format = OBJECT
hazelcast-invalidate-on-change = true
hazelcast-max-size-policy = ENTRY_COUNT
hazelcast-eviction-policy = LFU
hazelcast-cache-local-entries = false
hazelcast-enabled = true
hazelcast-directory = nearcache-dev
hazelcast-store-initial-delay-seconds = 300
hazelcast-store-interval-seconds = 600
hazelcast-local-update-policy = INVALIDATE
hazelcast-local-entries = true
hazelcast-serialize-key = true

# Licence Encryption
#licence.encryption.key=${LICENCE_ENCRYPTION_KEY}
#licence.hmac.key=${LICENCE_HMAC_KEY}
#licence.generator.server.url = http://localhost:8091

# License File Directory
gridflex.data.dir=C:/gridflex/data



