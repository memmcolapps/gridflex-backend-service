name: Deploy Spring Boot to Server

on:
  push:
    branches:
      - staging
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # =====================
      # Checkout
      # =====================
      - name: Checkout code
        uses: actions/checkout@v4

      # =====================
      # Java Setup
      # =====================
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # =====================
      # Build
      # =====================
      - name: Build with Maven
        run: |
          chmod +x mvnw
          ./mvnw package -DskipTests

      # =====================
      # Resolve JAR
      # =====================
      - name: Resolve JAR
        run: |
          JAR_FILE=$(find target -name "*.jar" ! -name "*original*.jar" | head -n 1)

          if [ -z "$JAR_FILE" ]; then
            echo "No JAR found"
            exit 1
          fi

          echo "JAR_FILE=$JAR_FILE" >> $GITHUB_ENV
          echo "Found: $JAR_FILE"

      # =====================================================
      # SSH SETUP (STAGING)
      # =====================================================
      - name: Setup SSH (Staging)
        if: github.ref == 'refs/heads/staging'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}

      # =====================================================
      # DEPLOY STAGING
      # =====================================================
      - name: Deploy Staging
        if: github.ref == 'refs/heads/staging'
        run: |
          SERVER="${{ secrets.STAGING_SERVER_USER }}@${{ secrets.STAGING_SERVER_HOST }}"
          REMOTE_PATH="/opt/java-webservices/gridflex-backend-service.jar"

          echo "Creating remote directory..."
          ssh -o StrictHostKeyChecking=no $SERVER "mkdir -p /opt/java-webservices"

          echo "Uploading JAR..."
          rsync -az --delete -e "ssh -o StrictHostKeyChecking=no" \
            "$JAR_FILE" \
            $SERVER:$REMOTE_PATH

          echo "Deploying (safe SSH execution)..."
          ssh -o StrictHostKeyChecking=no $SERVER 'bash -s' << 'EOF'

            set -e

            echo "Stopping app safely..."

            PID=$(ps -ef | grep gridflex-backend-service.jar | grep -v grep | awk '{print $2}')

            if [ -n "$PID" ]; then
              echo "Killing PID: $PID"
              kill -9 $PID || true
            else
              echo "No running process found"
            fi

            echo "Starting app..."

            nohup java -Dspring.profiles.active=staging \
              -jar /opt/java-webservices/gridflex-backend-service.jar \
              > /opt/java-webservices/gridflex-staging.log 2>&1 &

            echo "Deployment complete"
          EOF

      # =====================================================
      # SSH SETUP (PRODUCTION)
      # =====================================================
      - name: Setup SSH (Production)
        if: github.ref == 'refs/heads/main'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      # =====================================================
      # DEPLOY PRODUCTION
      # =====================================================
      - name: Deploy Production
        if: github.ref == 'refs/heads/main'
        run: |
          SERVER="${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }}"
          REMOTE_PATH="/opt/java-webservices/gridflex-backend-service.jar"

          echo "Creating remote directory..."
          ssh -o StrictHostKeyChecking=no $SERVER "mkdir -p /opt/java-webservices"

          echo "Uploading JAR..."
          rsync -az --delete -e "ssh -o StrictHostKeyChecking=no" \
            "$JAR_FILE" \
            $SERVER:$REMOTE_PATH

          echo "Deploying (safe SSH execution)..."
          ssh -o StrictHostKeyChecking=no $SERVER 'bash -s' << 'EOF'

            set -e

            echo "Stopping app safely..."

            PID=$(ps -ef | grep gridflex-backend-service.jar | grep -v grep | awk '{print $2}')

            if [ -n "$PID" ]; then
              echo "Killing PID: $PID"
              kill -9 $PID || true
            else
              echo "No running process found"
            fi

            echo "Starting app..."

            nohup java -Dspring.profiles.active=prod \
              -jar /opt/java-webservices/gridflex-backend-service.jar \
              > /opt/java-webservices/gridflex-prod.log 2>&1 &

            echo "Deployment complete"
          EOF


