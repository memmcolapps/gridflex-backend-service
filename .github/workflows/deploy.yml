name: Deploy Spring Boot to Server

on:
  push:
    branches:
      - staging
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # =====================
      # Checkout
      # =====================
      - name: Checkout code
        uses: actions/checkout@v4

      # =====================
      # Java Setup
      # =====================
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # =====================
      # Build
      # =====================
      - name: Build with Maven
        run: |
          chmod +x mvnw
          ./mvnw package -DskipTests

      # =====================
      # Resolve JAR
      # =====================
      - name: Resolve JAR
        run: |
          JAR_FILE=$(find target -name "*.jar" ! -name "*original*.jar" | head -n 1)

          if [ -z "$JAR_FILE" ]; then
            echo "No JAR found"
            exit 1
          fi

          echo "JAR_FILE=$JAR_FILE" >> $GITHUB_ENV
          echo "Found: $JAR_FILE"

      # =====================================================
      # SSH SETUP (STAGING)
      # =====================================================
      - name: Setup SSH (Staging)
        if: github.ref == 'refs/heads/staging'
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}

      # =====================================================
      # DEPLOY STAGING SSH_PORT="${{ secrets.STAGING_SERVER_SSH_PORT }}"
      # =====================================================
      - name: Deploy Staging
        if: github.ref == 'refs/heads/staging'
        run: |
          SERVER="${{ secrets.STAGING_SERVER_USER }}@${{ secrets.STAGING_SERVER_HOST }}"
          REMOTE_PATH="/${{ secrets.LOCATION }}/gridflex-backend-service.jar"

          echo "Creating remote directory..."
          ssh -o StrictHostKeyChecking=no $SERVER "mkdir -p /${{ secrets.LOCATION }}"

          echo "Uploading JAR..."
          rsync -az --delete -e "ssh -o StrictHostKeyChecking=no" \
            "$JAR_FILE" \
            $SERVER:$REMOTE_PATH
          
          echo "Writing env file..."
          ssh -o StrictHostKeyChecking=no $SERVER "cat > /${{ secrets.LOCATION }}/staging.env" << EOF
          DB_HOST="${{ secrets.STAGING_DB_HOST }}"
          DB_PORT="${{ secrets.STAGING_DB_PORT }}"
          DB_NAME="${{ secrets.STAGING_DB_NAME }}"
          DB_USERNAME="${{ secrets.STAGING_DB_USERNAME }}"
          DB_PASSWORD="${{ secrets.STAGING_DB_PASSWORD }}"
          MONGO_HOST="${{ secrets.STAGING_MONGO_HOST }}"
          MONGO_PORT="${{ secrets.STAGING_MONGO_PORT }}"
          MONGO_DB="${{ secrets.STAGING_MONGO_DB }}"
          MONGO_USERNAME="${{ secrets.STAGING_MONGO_USERNAME }}"
          MONGO_PASSWORD="${{ secrets.STAGING_MONGO_PASSWORD }}"
          HES_PORT="${{ secrets.HES_PORT }}"
          HES_ADDRESS="${{ secrets.STAGING_HES_ADDRESS }}"
          T_ADDRESS="${{ secrets.T_ADDRESS }}"
          T_PORT="${{ secrets.T_PORT }}"
          ADMIN_API_VALUE="${{ secrets.ADMIN_API_VALUE }}"
          USER_API_VALUE="${{ secrets.USER_API_VALUE }}"
          SETUP_API_VALUE="${{ secrets.SETUP_API_VALUE }}"
          JWT_SECRET="${{ secrets.JWT_SECRET }}"
          HEADER_KEY="${{ secrets.HEADER_KEY }}"
          EUREKA_ADDRESS="${{ secrets.EUREKA_ADDRESS }}"
          EUREKA_PORT="${{ secrets.EUREKA_PORT }}"
          BASE_ADDRESS="${{ secrets.BASE_ADDRESS }}"
          DOC_ADDRESS="${{ secrets.DOC_ADDRESS }}"
          STAGING_DOMAIN="${{ secrets.STAGING_DOMAIN }}"
          LOCATION="${{ secrets.LOCATION }}"
          EOF
          
          ssh -o StrictHostKeyChecking=no $SERVER "chmod 600 /${{ secrets.LOCATION }}/staging.env"

          echo "Deploying (safe SSH execution)..."
          ssh -o StrictHostKeyChecking=no $SERVER 'bash -s' << 'EOF'

            set -e

            echo "Stopping app safely..."

            PID=$(ps -ef | grep gridflex-backend-service.jar | grep -v grep | awk '{print $2}')

            if [ -n "$PID" ]; then
              echo "Killing PID: $PID"
              kill -9 $PID || true
            else
              echo "No running process found"
            fi

            echo "Starting app..."
          
            set -a
            source /${{ secrets.LOCATION }}/staging.env
            set +a

            nohup java -Dspring.profiles.active=staging \
              -jar /${{ secrets.LOCATION }}/gridflex-backend-service.jar \
              > /${{ secrets.LOCATION }}/gridflex-staging.log 2>&1 &

            echo "Deployment complete"
          EOF

      # =====================================================
      # SSH SETUP (PRODUCTION)
      # =====================================================
      - name: Setup SSH (Production)
        if: github.ref == 'refs/heads/main'
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      # =====================================================
      # DEPLOY PRODUCTION
      # =====================================================
      - name: Deploy Production
        if: github.ref == 'refs/heads/main'
        run: |
          SERVER="${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }}"
          REMOTE_PATH="/${{ secrets.LOCATION }}/gridflex-backend-service.jar"

          echo "Creating remote directory..."
          ssh -o StrictHostKeyChecking=no $SERVER "mkdir -p /${{ secrets.LOCATION }}"

          echo "Uploading JAR..."
          rsync -az --delete -e "ssh -o StrictHostKeyChecking=no" \
            "$JAR_FILE" \
            $SERVER:$REMOTE_PATH
          
          echo "Writing env file..."
          ssh -o StrictHostKeyChecking=no $SERVER "cat > /${{ secrets.LOCATION }}/prod.env" << EOF
          DB_HOST="${{ secrets.PROD_DB_HOST }}"
          DB_PORT="${{ secrets.PROD_DB_PORT }}"
          DB_NAME="${{ secrets.PROD_DB_NAME }}"
          DB_USERNAME="${{ secrets.PROD_DB_USERNAME }}"
          DB_PASSWORD="${{ secrets.PROD_DB_PASSWORD }}"
          MONGO_HOST="${{ secrets.PROD_MONGO_HOST }}"
          MONGO_PORT="${{ secrets.PROD_MONGO_PORT }}"
          MONGO_DB="${{ secrets.PROD_MONGO_DB }}"
          MONGO_USERNAME="${{ secrets.PROD_MONGO_USERNAME }}"
          MONGO_PASSWORD="${{ secrets.PROD_MONGO_PASSWORD }}"
          HES_PORT="${{ secrets.HES_PORT }}"
          HES_ADDRESS="${{ secrets.PROD_HES_ADDRESS }}"
          T_ADDRESS="${{ secrets.T_ADDRESS }}"
          T_PORT="${{ secrets.T_PORT }}"
          ADMIN_API_VALUE="${{ secrets.ADMIN_API_VALUE }}"
          USER_API_VALUE="${{ secrets.USER_API_VALUE }}"
          SETUP_API_VALUE="${{ secrets.SETUP_API_VALUE }}"
          JWT_SECRET="${{ secrets.JWT_SECRET }}"
          HEADER_KEY="${{ secrets.HEADER_KEY }}"
          EUREKA_ADDRESS="${{ secrets.EUREKA_ADDRESS }}"
          EUREKA_PORT="${{ secrets.EUREKA_PORT }}"
          BASE_ADDRESS="${{ secrets.BASE_ADDRESS }}"
          DOC_ADDRESS="${{ secrets.DOC_ADDRESS }}"
          PROD_DOMAIN="${{ secrets.PROD_DOMAIN }}"
          LOCATION="${{ secrets.LOCATION }}"
          EOF
          
          ssh -o StrictHostKeyChecking=no $SERVER "chmod 600 /${{ secrets.LOCATION }}/prod.env"


          echo "Deploying (safe SSH execution)..."
          ssh -o StrictHostKeyChecking=no $SERVER 'bash -s' << 'EOF'

            set -e

            echo "Stopping app safely..."

            PID=$(ps -ef | grep gridflex-backend-service.jar | grep -v grep | awk '{print $2}')

            if [ -n "$PID" ]; then
              echo "Killing PID: $PID"
              kill -9 $PID || true
            else
              echo "No running process found"
            fi

            echo "Starting app..."
          
            set -a
            source /${{ secrets.LOCATION }}/prod.env
            set +a

            nohup java -Dspring.profiles.active=prod \
              -jar /${{ secrets.LOCATION }}/gridflex-backend-service.jar \
              > /${{ secrets.LOCATION }}/gridflex-prod.log 2>&1 &

            echo "Deployment complete"
          EOF

